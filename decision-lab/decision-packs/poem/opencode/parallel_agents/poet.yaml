# =============================================================================
# Parallel agent configuration
# =============================================================================
# This file tells the parallel-agents tool how to run multiple instances of
# the "poet" agent simultaneously.
#
# When the orchestrator (literary-agent.md) calls:
#   { "agent": "poet", "prompts": ["style A", "style B", "style C"] }
#
# dlab creates:
#   parallel/run-{timestamp}/
#     instance-1/    ← runs poet.md with "style A" + subagent_suffix_prompt
#     instance-2/    ← runs poet.md with "style B" + subagent_suffix_prompt
#     instance-3/    ← runs poet.md with "style C" + subagent_suffix_prompt
#     consolidated_summary.md  ← written by auto-generated consolidator (if 3+)
#
# Each instance is fully isolated:
#   - Own copy of data/ (empty here since requires_data: false)
#   - Own .opencode/ with only poet.md (mode changed from subagent to primary)
#   - Only tools listed in poet.md's frontmatter
#   - Cannot see other instances' files
#
# Logs go to: _opencode_logs/poet-parallel-run-{timestamp}/instance-{N}.log
#
# The corresponding agent file is: opencode/agents/poet.md
# Full reference: docs/parallel-agents.md

# Must match a .md file in opencode/agents/
name: poet

description: "Spawn multiple poets with different styles"

# Per-instance timeout. If an instance takes longer, it's killed.
timeout_minutes: 5

# What happens when an instance fails:
#   "continue"  — other instances keep running (good for independent tasks)
#   "fail_fast" — stop all instances immediately
#   "retry"     — retry the failed instance (up to max_retries times)
failure_behavior: continue

# LLM model for all instances. To use a different model per instance, remove
# this and use instance_models instead (see below).
default_model: "google/gemini-2.5-flash"

# Maximum number of instances the orchestrator can spawn in one call.
# The orchestrator decides how many to actually spawn (based on how many
# prompts it passes). This is just a cap.
max_instances: 5

# To use different LLMs per instance (for diversity), uncomment:
# instance_models:
#   - "anthropic/claude-sonnet-4-5"
#   - "google/gemini-2.5-pro"
#   - "deepseek/deepseek-chat"

# Appended to every instance's prompt. This defines the output format that
# the consolidator expects. All instances must write summary.md with the
# same structure so the consolidator can compare them.
subagent_suffix_prompt: |
  Write your poem to summary.md in your working directory.
  Include a brief note about the style you used.

# Instructions for the auto-generated consolidator agent. The consolidator:
#   - Runs automatically when 3 or more instances complete
#   - Has READ-ONLY permissions (no edit, no bash, no custom tools)
#   - Reads all instance summary.md files
#   - Writes consolidated_summary.md at the run root
#   - Should compare and present trade-offs, NEVER pick a winner
#     (the orchestrator makes that decision)
summarizer_prompt: |
  You are a poetry critic with READ-ONLY access.

  Read the following poem files:
  {summary_paths}

  Create a brief comparison of all poems.
  Note the strengths of each approach.
  Do NOT pick a winner - present observations only.

# Model for the consolidator. Can be a cheaper/faster model since it only
# reads and summarizes.
summarizer_model: "google/gemini-2.5-flash"
